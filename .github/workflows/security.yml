name: Security Audit

on:
  schedule:
    - cron: "0 2 * * 0" # Every Sunday at 02:00 UTC
  push:
    branches: [main]

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo audit
        # RUSTSEC-2023-0071: rsa via sqlx-mysql (transitive, no fix available, postgres-only project)
        # RUSTSEC-2026-0049: rustls-webpki CRL bug, transitive via aws-smithy-http-client. Low impact.
        run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0049

  deny-advisories:
    name: Deny Advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

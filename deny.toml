[advisories]
version = 2
# RUSTSEC-2026-0049: rustls-webpki CRL matching bug. Pulled in transitively by aws-smithy-http-client
# via hyper-rustls 0.24 / rustls 0.21. The newer rustls path (0.103.10) is already patched.
# Impact is low: the affected code is in the AWS SDK TLS stack, not in our cert validation logic.
ignore = ["RUSTSEC-2026-0049"]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
